name: iOS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging Sources/

  build-and-test:
    name: Build & Test (iOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Find available simulator
        run: |
          UDID=$(xcrun simctl list devices available -j | \
            python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; [print(v['udid']) or exit() for k,vs in d.items() for v in vs if 'iOS' in k and v['isAvailable'] and 'iPhone' in v['name']]")
          echo "SIM_UDID=$UDID" >> $GITHUB_ENV

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project TrailWeight.xcodeproj \
            -scheme TrailWeight

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project TrailWeight.xcodeproj \
            -scheme TrailWeight \
            -destination "id=$SIM_UDID" \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

      - name: Run unit tests
        run: |
          xcodebuild test-without-building \
            -project TrailWeight.xcodeproj \
            -scheme TrailWeight \
            -destination "id=$SIM_UDID" \
            -derivedDataPath DerivedData \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-ios
          path: TestResults.xcresult
          retention-days: 7
