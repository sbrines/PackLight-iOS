name: PackLight
options:
  bundleIdPrefix: com.stephenbrines
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_TESTABILITY: YES
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: 2.7.0

targets:
  PackLight:
    type: application
    platform: iOS
    sources:
      - path: Sources/PackLight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stephenbrines.packlight
        INFOPLIST_FILE: Sources/PackLight/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: YES
    dependencies:
      - package: SwiftSoup
    info:
      path: Sources/PackLight/Info.plist
      properties:
        CFBundleName: PackLight
        CFBundleDisplayName: PackLight
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSCameraUsageDescription: "Used to photograph gear items for your inventory."
        NSPhotoLibraryUsageDescription: "Used to add photos of gear items."
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true

  PackLightTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/PackLightTests
    dependencies:
      - target: PackLight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stephenbrines.packlighttests

schemes:
  PackLight:
    build:
      targets:
        PackLight: all
        PackLightTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PackLightTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
