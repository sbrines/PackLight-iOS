name: TrailWeight
options:
  bundleIdPrefix: com.stephenbrines
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_TESTABILITY: YES
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: 2.7.0

targets:
  TrailWeight:
    type: application
    platform: iOS
    sources:
      - path: Sources/TrailWeight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stephenbrines.trailweight
        INFOPLIST_FILE: Sources/TrailWeight/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: SwiftSoup
    info:
      path: Sources/TrailWeight/Info.plist
      properties:
        CFBundleName: TrailWeight
        CFBundleDisplayName: TrailWeight
        CFBundleIconName: AppIcon
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSCameraUsageDescription: "Used to photograph gear items for your inventory."
        NSPhotoLibraryUsageDescription: "Used to add photos of gear items."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true

  TrailWeightTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/TrailWeightTests
    dependencies:
      - target: TrailWeight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stephenbrines.trailweighttests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  TrailWeight:
    build:
      targets:
        TrailWeight: all
        TrailWeightTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TrailWeightTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
